# Language: YAML (GitHub Actions workflow)
name: getmac Workflow

on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  fetch_macs:
    runs-on: macos-latest  # Change to ubuntu-latest if preferred
    timeout-minutes: 360    # Handles long-running steps
    env:
      GETMAC_API_KEY: ${{ secrets.GETMAC_API_KEY }}
    steps:
      # Step 1: Checkout repository
      - uses: actions/checkout@v3

      # Step 2: Install necessary dependencies
      - name: Install dependencies
        run: |
          # macOS package manager (brew) install
          brew install jq || true
          # Python installation for API processing
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      # Step 3: Configure macOS locale (optional for UK settings)
      - name: Configure macOS locale
        run: |
          defaults write NSGlobalDomain AppleLanguages -array "en-GB"
          defaults write NSGlobalDomain AppleLocale -string "en_GB"
          defaults write NSGlobalDomain AppleMeasurementUnits -string "Centimeters"
          defaults write NSGlobalDomain AppleMetricUnits -bool true
          killall Finder || true

      # Step 4: Fetch data from getmac.io with retries
      - name: Fetch getmac.io data
        run: |
          set -e  # Halt on errors
          for i in {1..5}; do
            response=$(curl -sS -H "Authorization: Bearer $GETMAC_API_KEY" https://getmac.io/api || true)
            if [ -n "$response" ]; then
              echo "$response" | jq '.'
              break
            fi
            echo "Attempt $i failed, retrying after $((i*5)) seconds..."
            sleep $((i*5))
          done
        env:
          GETMAC_API_KEY: ${{ secrets.GETMAC_API_KEY }}

      # Step 5: Optional: Verify locale and environment
      - name: Verify locale settings
        run: locale
