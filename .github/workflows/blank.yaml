# File: .github/workflows/macos-long-run.yml
name: macOS Long Run Workflow

# Allow triggering on push to main branch or manually
on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger

jobs:
  long_run:
    runs-on: getmac
    timeout-minutes: 360 # Maximum 6 hours

    steps:
      # Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Configure macOS locale and region to UK
      - name: Configure macOS locale
        run: |
          defaults write NSGlobalDomain AppleLanguages -array "en-GB"
          defaults write NSGlobalDomain AppleLocale -string "en_GB"
          defaults write NSGlobalDomain AppleMeasurementUnits -string "Centimeters"
          defaults write NSGlobalDomain AppleMetricUnits -bool true
          killall Finder || true

      # Verify locale
      - name: Verify locale settings
        run: locale

      # Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Install example dependencies, if needed
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Example: install required packages
          # pip install -r requirements.txt

      # Long-running job with periodic logging every 5 seconds
      - name: Keep macOS runner alive with heartbeat logs
        run: |
          echo "Starting long run task with periodic heartbeat..."
          # Loop for 720 iterations × 5 seconds = 1 hour; adjust as needed
          for i in {1..720}
          do
            echo "Heartbeat: $(date) – iteration $i"
            sleep 5
          done
          echo "Long run task completed."

      # Additional custom workflow steps
      - name: Additional Steps
        run: |
          echo "Add your main workflow commands here."
          # Example: build, test, deploy tasks
          # python main.py

      # Optional: run background heartbeat while main task executes
      # Uncomment if you want parallel logging
      # - name: Background Heartbeat
      #   run: |
      #     echo "Starting background heartbeat..."
      #     (while true; do echo "Heartbeat: $(date)"; sleep 5; done) &
      #     echo "Main tasks running alongside background heartbeat..."
