# File: .github/workflows/macos-long-run.yml
name: macOS Long Run Workflow

# Allow triggering on push to main branch or manually
on:
push:
branches:
- main
workflow_dispatch: # Manual trigger

jobs:
long_run:
runs-on: getmac
timeout-minutes: 360 # Maximum 6 hours

steps:
# Checkout repository code
- name: Checkout Code
uses: actions/checkout@v3

# Configure macOS locale and region to UK
- name: Configure macOS locale
run: |
defaults write NSGlobalDomain AppleLanguages -array "en-GB"
defaults write NSGlobalDomain AppleLocale -string "en_GB"
defaults write NSGlobalDomain AppleMeasurementUnits -string "Centimeters"
defaults write NSGlobalDomain AppleMetricUnits -bool true
killall Finder || true
# Verify locale
- name: Verify locale settings
run: locale

# Set up Python environment
