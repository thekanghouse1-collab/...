# language: YAML
name: macOS Long-Running Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  long_running_job:
    runs-on: getmac
    # Set job timeout to 6 hours
    timeout-minutes: 360
    steps:

      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Heartbeat step to prevent idle timeout
      - name: Keep-Alive Heartbeat
        run: |
          echo "Starting heartbeat..."
          end=$((SECONDS + 21600))  # Run for 6 hours (6*3600 seconds)
          while [ $SECONDS -lt $end ]; do
            echo "Workflow is still running... $(date)"
            sleep 5  # Heartbeat interval: 5 seconds
          done
      # Placeholder for main task (replace this with actual commands)
      - name: Run Main Task
        run: |
          echo "Starting main job..."
          # Simulate long-running task
          sleep 21595  # Simulate ~6-hour long task minus heartbeat loop safety
          echo "Main job completed."
      # Optional: Additional steps (build, test, deploy) can be added here
      - name: Final Step
        run: echo "Workflow completed at $(date)"
