# File: .github/workflows/macos-long-run.yml
name: macOS Long Run Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  long_run:
    runs-on: macos-latest
    timeout-minutes: 360 # Maximum of 6 hours
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure macOS Locale and Region
        run: |
          defaults write NSGlobalDomain AppleLanguages -array "en-GB"
          defaults write NSGlobalDomain AppleLocale -string "en_GB"
          defaults write NSGlobalDomain AppleMeasurementUnits -string "Centimeters"
          defaults write NSGlobalDomain AppleMetricUnits -bool true
          killall Finder || true

      - name: Verify Locale Settings
        run: locale

      - name: Set up Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew update

      - name: Install dependencies
        run: |
          brew install python node

      - name: Run macOS build script with 5-second logging
        run: |
          echo "Starting long-running Mac build..."
          
          # Run a background logger printing every 5 seconds
          while true; do
            echo "Mac build is still running... $(date)"
            sleep 5
          done &
          LOG_PID=$!

          # Run your actual build script
          ./build-macos.sh

          # Kill the background logger after build completes
          kill $LOG_PID || true

      - name: Post-build actions
        run: echo "Mac build completed"
