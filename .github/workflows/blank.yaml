name: macOS Long-Run Logger

on:
  workflow_dispatch:  # Manual trigger, can also use schedules

jobs:
  long_run_job:
    runs-on: getmac
    timeout-minutes: 360  # Maximum runtime: 6 hours

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up logging directory
        run: mkdir -p ${{ github.workspace }}/logs

      - name: Run long task with frequent logging
        run: |
          log_file="${GITHUB_WORKSPACE}/logs/run_log.txt"
          echo "Starting long-running task at $(date)" >> "$log_file"

          end_time=$(( $(date +%s) + 6 * 60 * 60 ))

          while [ $(date +%s) -lt $end_time ]; do
            echo "$(date): Task is still running..." >> "$log_file"
            sleep 5  # Log every 5 seconds to keep runner active
          done

          echo "Completed long-running task at $(date)" >> "$log_file"

      - name: Display log file
        run: cat ${{ github.workspace }}/logs/run_log.txt

      - name: Upload log artifact
        uses: actions/upload-artifact@v3
        with:
          name: long_run_logs
          path: ${{ github.workspace }}/logs/run_log.txt
