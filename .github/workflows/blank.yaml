# language: YAML
name: macOS Long-Running Workflow

on: 
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  long_running_job:
    runs-on: macos-latest
    timeout-minutes: 360
    steps:
      # Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install Tailscale
      - name: Install Tailscale
        run: |
          echo "Installing Tailscale..."
          curl -fsSL https://pkgs.tailscale.com/stable/tailscale_amd64.pkg -o tailscale.pkg
          sudo installer -pkg tailscale.pkg -target /
          tailscale version

      # Heartbeat step to prevent idle timeout
      - name: Keep-Alive Heartbeat
        run: |
          echo "Starting heartbeat..."
          end=$((SECONDS + 21600))
          while [ $SECONDS -lt $end ]; do
            echo "Workflow is still running... $(date)"
            sleep 5
          done

      # Placeholder for main task (replace this with actual commands)
      - name: Run Main Task
        run: |
          echo "Starting main job..."
          sleep 21595
          echo "Main job completed."

      # Optional: Additional steps (build, test, deploy) can be added here
      - name: Final Step
        run: echo "Workflow completed at $(date)"
