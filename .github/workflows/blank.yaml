# language: YAML
name: macOS Long-Running Workflow with Tailscale

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  long_running_job:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install Tailscale
      - name: Install Tailscale
        run: |
          echo "Installing Tailscale..."
          # Download latest Tailscale .pkg for macOS
          curl -fsSL https://pkgs.tailscale.com/stable/tailscale_amd64.pkg -o tailscale.pkg
          # Install it system-wide
          sudo installer -pkg tailscale.pkg -target /
          # Verify installation
          tailscale version

      # Step 3: Keep-Alive Heartbeat (prevents idle timeout)
      - name: Keep-Alive Heartbeat
        run: |
          echo "Starting heartbeat..."
          end=$((SECONDS + 21600))   # 6 hours
          while [ $SECONDS -lt $end ]; do
            echo "Workflow is still running... $(date)"
            sleep 5
          done

      # Step 4: Main Task Placeholder (replace with your real commands)
      - name: Run Main Task
        run: |
          echo "Starting main job..."
          # Simulate long-running task
          sleep 21595
          echo "Main job completed."

      # Optional Step: Tailscale Authentication (if needed with a secret)
      # - name: Authenticate Tailscale
      #   run: |
      #     echo "Authenticating Tailscale..."
      #     sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTHKEY }}

      # Step 5: Final Step
      - name: Final Step
        run: echo "Workflow completed at $(date)"
