# File: .github/workflows/simulate_school_day.yml
name: Simulate Full School Day

on:
  workflow_dispatch:  # Allows manual trigger

jobs:
  full_school_day:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours maximum

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Simulate school day logging
        run: |
          #!/bin/bash
          echo "Starting full school day simulation..."
          
          # Set total duration in seconds (6 hours = 6*60*60)
          TOTAL_DURATION=$((6*60*60))
          INTERVAL=5  # Log every 5 seconds
          
          START_TIME=$(date +%s)
          CURRENT_TIME=$START_TIME
          
          # Loop until 6 hours have passed
          while [ $((CURRENT_TIME - START_TIME)) -lt $TOTAL_DURATION ]; do
            ELAPSED=$((CURRENT_TIME - START_TIME))
            HOUR=$(( ELAPSED / 3600 ))
            MINUTE=$(( (ELAPSED % 3600) / 60 ))
            SECOND=$(( ELAPSED % 60 ))
            
            echo "Time elapsed: ${HOUR}h ${MINUTE}m ${SECOND}s - Logging school activities..."
            
            sleep $INTERVAL
            CURRENT_TIME=$(date +%s)
          done
          
          echo "Simulation complete: Full 6-hour school day concluded."
